<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lilpo Tour 2026</title>
    <style>
        /* Ocultamos elementos automáticos del tema de GitHub */
        header, footer, pre, code, hr, #header, #footer, .header, .footer {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        /* Animación para el fondo (de blanco a rosa) */
        @keyframes fondoFade {
            0% { background-color: #ffffff; }
            100% { background-color: #ffc0cb; }
        }

        /* Animación para que las secciones aparezcan con suavidad */
        @keyframes fadeEfecto {
            from { opacity: 0; transform: translate(-50%, -48%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100vh !important;
            overflow-x: hidden !important;
            background-color: #ffffff;
            animation: fondoFade 2.5s ease-out forwards !important;
        }

        /* Contenedor principal que aísla el diseño */
        .pantalla-limpia {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            display: block !important;
            z-index: 999999 !important;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif !important;
            text-align: center !important;
        }

        /* Estructura para centrar las secciones en la pantalla */
        .seccion {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 600px;
            transition: opacity 0.5s ease;
        }

        /* Clases para ocultar y mostrar con transiciones */
        .oculto {
            display: none !important;
            opacity: 0;
        }

        .activo {
            display: block !important;
            animation: fadeEfecto 0.6s ease-out forwards;
        }

        }
